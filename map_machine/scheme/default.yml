include:

  - nodes
  - roads
  - ways
  - keys

options:

  nodes: yes
  trees: yes
  craters: yes
  directions: yes

  buildings: flat
  roads: simple
  mode: normal
  labels: main

  roofs: yes
  building_colors: full
  background: yes

variables:

  # Default colors for icons.
  default: "#444444"
  extra: "#888888"

  # Direction sector colors.
  direction_view_color: "#C8E8FF"
  direction_camera_color: "#0088FF"

  # Main colors.
  background_color: "#EEEEEE"
  road_color: "#FFFFFF"
  road_border_color: "#CCCCCC"
  text_color: "#444444"
  text_main_color: "#000000"
  text_outline_color: "#FFFFFF"

  # Natural land.
  wheat_color: "#F0DCAA"
  wheat_border_color: "#F4D67F"
  wheat_dark_color: "#BF9340"
  rye_color: "#E0CA96"
  rye_dark_color: "#AE955D"
  oat_color: "#EDDDB7"
  oat_dark_color: "#C4894A"
  barley_color: "#F3EEC4"
  barley_border_color: "#D2CE9D"
  barley_dark_color: "#908F62"
  sunflower_dark_color: "#DEAC4A"

  private_opacity: 1.0

  # Buildings.
  building_border_color: {color: $building_color, darken: 0.13}
  building_color: "#F8F0E8"
  building_color_flat: "#D4DADC"
  building_construction_border_color: "#C4C0BC"
  building_construction_color: "#D4D0CC"
  construction_color: "#CCCCCC"

  # Roads.
  # aeroway_color
  bridge_color: "#666666"
  # cycle_border_color
  # cycle_noaccess_color
  cycle_color: "#4444EE"
  cycle_border_opacity: 0.4
  cycle_dasharray: 8.0,2.0
  embankment_color: "#666666"
  ford_color: "#88BBFF"
  foot_border_color: "#FFFFFF"
  foot_border_width: 3.0
  # foot_color-noaccess
  foot_color: "#B89A74"
  foot_dasharray: 7.0,3.0
  motorway_border_color: "#CC8800"
  motorway_color: "#FFAA33"
  primary_border_color: "#AA8800"
  primary_color: "#FFDD66"
  secondary_border_color: "#BB9911"
  secondary_color: "#FFEE77"
  tertiary_border_color: "#AAAAAA"
  tertiary_color: "#FFFFFF"

  # Railways.
  rail_bg_color: "#BBBBBB"
  rail_bg_width: 3.0
  rail_dash_color: "#444444"
  rail_dash_width: 1.0
  rail_dasharray: 8,8
  light_rail_color: "#CCCCCC"
  light_rail_width: 3.0
  tram_color: "#BBBBBB"
  tram_width: 3.0
  subway_color: "#AAAAAA"
  subway_width: 3.5
  monorail_bg_color: "#CCCCCC"
  monorail_bg_width: 3.0
  monorail_bg_opacity: 1.0
  monorail_color: "#444444"
  monorail_width: 1.0
  monorail_dasharray: no
  railway_construction_color: "#000000"
  railway_construction_width: 2.0
  railway_construction_dasharray: 6,3
  railway_disused_color: "#000000"
  railway_disused_width: 3.0
  railway_disused_dasharray: 6,6

  # Node colors.
  amenity_brown_color: $default
  craft_color: "#008800"
  decidious_color: "#F0A020"
  eat_color: $default
  evergreen_color: "#688C44"
  man_made_color: $default
  memorials_color: $default
  sell_color: "#AA00AA"
  sell_text_color: $default

  # Address.
  address_interpolation_border_color: "#666666"
  address_interpolation_border_width: 1
  address_interpolation_border_dasharray: 2,4

  # Power.
  power_line_color: black
  power_line_width: 1.0
  power_line_opacity: 0.2

  # Land cover.
  cemetery_color: black
  cemetery_opacity: 0.05
  commercial_border_color: black
  commercial_border_width: 0.0
