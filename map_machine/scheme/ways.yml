      stroke-width: $playground_border_width
    priority: $priority_landuse_3
  - tags: {leisure: swimming_pool}
    style:
      fill: $water_color
      stroke: $water_border_color
      stroke-width: 1.0

  - tags: {tourism: artwork}
    style:
      stroke: "#888888"
      stroke-width: 1.0
    priority: $priority_objects
  - tags: {barrier: hedge}
    style:
      fill: none
      stroke: $wood_color
      stroke-width: 4.0
    priority: $priority_landuse_2
  - tags: {barrier: city_wall}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 2.0
      opacity: 0.5
    priority: $priority_barrier
  - tags: {barrier: wall}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.5
      opacity: 0.4
    priority: $priority_barrier
  - tags: {man_made: embankment}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.0
      opacity: 0.3
    priority: $priority_barrier
  - tags: {man_made: embankment}
    parallel_offset: -1.5
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 3.0
      opacity: 0.3
      stroke-dasharray: "1,7"
    priority: $priority_barrier
  - tags: {barrier: fence}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.0
      opacity: 0.25
    priority: $priority_barrier
  - tags: {barrier: retaining_wall}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.0
      opacity: 0.25
    priority: $priority_barrier
  - tags: {barrier: handrail}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.0
      opacity: 0.2
    priority: $priority_barrier
  - tags: {barrier: kerb}
    style:
      fill: none
      stroke: "#000000"
      stroke-width: 1.0
      opacity: 0.15
    priority: $priority_barrier

  - tags: {border: "*"}
    style:
      stroke: "#FF0000"
      stroke-width: 0.5
      stroke-dasharray: 10.0,20.0
  - tags: {"area:highway": "*"}

  - tags: {boundary: "*"}
    style:
      stroke: $boundary_color
      stroke-width: 0.3
      stroke-dasharray: 10.0,5.0
    priority: $priority_boundary

area_tags:
  - tags: {aeroway: "*"}
  - tags: {building: "*"}
  - tags: {landuse: "*"}
  - tags: {leisure: "*"}
  - tags: {natural: "*"}
    exception: {natural: "tree_row"}
  - tags: {indoor: "corridor"}
  - tags: {power: "compensator"}
  - tags: {power: "substation"}
