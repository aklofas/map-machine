  # Colors not in W3C.
  rose: "#FF007F"  # Wikipedia.
  slate_blue: "#6A5ACD"  # W3C slateblue.
  bronze: "#CD7F32"
  concrete: "#AAAAAA"
  glass: "#CCEEFF"
